{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white text-center">
                <h2>Model Performance Analysis</h2>
            </div>
            <div class="card-body text-center">
                <p class="lead">Comparison of trained models based on Accuracy, Precision, Recall, and F1-Score.</p>
                <div class="mt-4 mb-4">
                    <img src="data:image/png;base64,{{ graph }}" alt="Model Comparison Graph"
                        class="img-fluid border rounded shadow-sm">
                </div>
                <div class="mt-4">
                    <a href="{% url 'upload_data' %}" class="btn btn-outline-primary me-2">Back to Training</a>
                    <a href="{% url 'prediction' %}" class="btn btn-success">Go to Prediction</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
